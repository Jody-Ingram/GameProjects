<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Friend Fighter v0.1</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #070915; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
  body {
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 20% 20%, rgba(44, 102, 255, .20), transparent 34%),
      radial-gradient(circle at 80% 15%, rgba(255, 60, 133, .15), transparent 32%),
      linear-gradient(160deg, #0a0d1d 0%, #050611 70%);
  }
  #shell { width: min(100vw, 1280px); padding: 10px; position: relative; }
  #gameWrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.10), inset 0 0 0 1px rgba(255,255,255,.08);
    background: #0b1026;
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  #footer {
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 8px 4px 0;
    color: rgba(236,242,255,.72);
    font-size: clamp(10px, 1.1vw, 13px);
    letter-spacing: .02em;
    text-align: center;
    user-select: none;
  }
  kbd { padding: 2px 7px; border: 1px solid rgba(255,255,255,.20); border-bottom-width: 3px; border-radius: 6px; background: rgba(255,255,255,.08); color: #fff; font: inherit; font-weight: 800; }
  #touchControls { display: none; position: absolute; inset: 0; pointer-events: none; }
  .touchCluster { position: absolute; bottom: 18px; display: flex; gap: 10px; pointer-events: auto; }
  .touchCluster.left { left: 18px; }
  .touchCluster.right { right: 18px; }
  .touchBtn { width: 58px; height: 58px; border-radius: 50%; border: 1px solid rgba(255,255,255,.24); background: rgba(7,10,25,.55); color: white; display: grid; place-items: center; font-weight: 900; font-size: 20px; backdrop-filter: blur(8px); user-select: none; }
  @media (hover:none), (pointer:coarse) {
    #touchControls { display: block; }
    #footer { display: none; }
    #shell { padding: 0; width: 100vw; }
    #gameWrap { border-radius: 0; }
  }
</style>
</head>
<body>
<div id="shell">
  <div id="gameWrap">
    <canvas id="game" width="1280" height="720" aria-label="Friend Fighter v0.1 browser fighting game"></canvas>
    <div id="touchControls">
      <div class="touchCluster left">
        <div class="touchBtn" data-action="left">◀</div>
        <div class="touchBtn" data-action="right">▶</div>
        <div class="touchBtn" data-action="jump">⤴</div>
      </div>
      <div class="touchCluster right">
        <div class="touchBtn" data-action="attack">A</div>
        <div class="touchBtn" data-action="special">S</div>
        <div class="touchBtn" data-action="dodge">D</div>
      </div>
    </div>
  </div>
  <div id="footer">
    <span><kbd>A</kbd>/<kbd>D</kbd> Move</span>
    <span><kbd>W</kbd>/<kbd>Space</kbd> Jump</span>
    <span><kbd>J</kbd> Attack</span>
    <span><kbd>K</kbd> Special</span>
    <span><kbd>L</kbd> Dodge</span>
    <span><kbd>P</kbd> Pause</span>
  </div>
</div>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const TAU = Math.PI * 2;

  const keys = Object.create(null);
  const pressed = new Set();
  const touch = { left:false, right:false, jump:false, attack:false, special:false, dodge:false };

  const FORM_DATA = [
    { name:'Fire', color:'#ff5c44', color2:'#ffcc4d', desc:'Power style • fireball special', speed:1.00, damage:1.12, cooldown:1.08 },
    { name:'Ice', color:'#59c9ff', color2:'#dff7ff', desc:'Control style • slows opponents', speed:.97, damage:.93, cooldown:.92 },
    { name:'Lightning', color:'#ffe74a', color2:'#9afff8', desc:'Speed style • electric dash', speed:1.10, damage:.94, cooldown:.84 }
  ];

  const CHARACTERS = [
    { id:'gleebo', name:'Gleebo', subtitle:'Elemental All-Rounder', desc:'Choose Fire, Ice, or Lightning to change his special move and combat rhythm.', accent:'#7ee85a' },
    { id:'moron', name:'Mo-ron', subtitle:'Long-Reach Trickster', desc:'Floating hands and feet give him unusual range, aerial movement, and a spinning special.', accent:'#24d164' },
    { id:'bigl', name:'Big L', subtitle:'Sword-Dash Duelist', desc:'Fast sword slashes and a committed dash strike. Great at controlling the ground.', accent:'#4fa6ff' },
    { id:'straw', name:'Mr. Straw Hat', subtitle:'Stretchy Rushdown', desc:'A fearless pirate brawler with long punches and a rubber-powered rocket attack.', accent:'#ffb14a' }
  ];

  function safeGet(key, fallback='0'){ try { return localStorage.getItem(key) ?? fallback; } catch(e) { return fallback; } }
  function safeSet(key, value){ try { localStorage.setItem(key, value); } catch(e) {} }

  const game = {
    state:'title',
    time:0,
    roundTime:99,
    selected:0,
    form:0,
    paused:false,
    winner:null,
    cpuChoice:1,
    shake:0,
    flash:0,
    introTimer:0,
    titlePulse:0,
    muted:false,
    audioReady:false,
    wins:Number(safeGet('friendFighterWins','0') || 0),
    particles:[],
    attacks:[],
    effects:[],
    stars:Array.from({length:90}, (_,i)=>({x:Math.random()*W,y:Math.random()*H*.75,r:Math.random()*2+.3,s:Math.random()*.35+.08,p:Math.random()*TAU})),
    lastTimestamp:performance.now(),
    accumulator:0
  };

  const STAGE = {
    platforms:[
      {x:150,y:560,w:980,h:34,main:true},
      {x:300,y:420,w:220,h:22},
      {x:760,y:420,w:220,h:22},
      {x:530,y:305,w:220,h:22}
    ]
  };

  let player = null, cpu = null;

  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  function lerp(a,b,t){ return a+(b-a)*t; }
  function rand(a,b){ return a+Math.random()*(b-a); }
  function sign(v){ return v<0?-1:1; }
  function rects(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
  function roundedRect(x,y,w,h,r,fill=true,stroke=false){
    r=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); if(fill)ctx.fill(); if(stroke)ctx.stroke();
  }
  function circle(x,y,r,fill=true,stroke=false){ ctx.beginPath(); ctx.arc(x,y,r,0,TAU); if(fill)ctx.fill(); if(stroke)ctx.stroke(); }
  function text(txt,x,y,size,weight='800',align='center',color='#fff'){
    ctx.font=`${weight} ${size}px Inter, ui-sans-serif, system-ui, sans-serif`; ctx.textAlign=align; ctx.textBaseline='middle'; ctx.fillStyle=color; ctx.fillText(txt,x,y);
  }

  const audio = {
    ctx:null,
    init(){
      if(game.audioReady) return;
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); game.audioReady=true; } catch(e){}
    },
    tone(freq=220,dur=.08,type='square',vol=.035,slide=0){
      if(game.muted) return; this.init(); if(!this.ctx) return;
      const t=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.type=type; o.frequency.setValueAtTime(freq,t); if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(20,freq+slide),t+dur);
      g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
      o.connect(g); g.connect(this.ctx.destination); o.start(t); o.stop(t+dur);
    },
    select(){ this.tone(520,.05,'square',.025,80); },
    confirm(){ this.tone(320,.08,'triangle',.04,350); setTimeout(()=>this.tone(720,.09,'triangle',.03,120),55); },
    jump(){ this.tone(260,.09,'square',.02,180); },
    swing(){ this.tone(160,.055,'sawtooth',.025,-60); },
    hit(){ this.tone(95,.11,'square',.05,-35); },
    special(){ this.tone(420,.14,'sawtooth',.035,280); },
    ko(){ this.tone(140,.42,'sawtooth',.055,-100); }
  };

  function addParticle(x,y,color,count=8,speed=5,life=35,size=4){
    for(let i=0;i<count;i++) game.particles.push({x,y,vx:Math.cos(rand(0,TAU))*rand(.5,speed),vy:Math.sin(rand(0,TAU))*rand(.5,speed),life:rand(life*.6,life),max:life,color,size:rand(size*.5,size*1.4),g:.09});
  }

  function makeFighter(index, x, facing, isCPU=false, form=0){
    const c=CHARACTERS[index];
    const f={
      charIndex:index, id:c.id, name:c.name, x, y:430, prevY:430, w:66, h:94, vx:0, vy:0, facing,
      hp:100, maxHp:100, grounded:false, platform:null, jumps:2, speed:5.25, accel:.72, jumpPower:13.2,
      attackCooldown:0, specialCooldown:0, dodgeCooldown:0, attackTimer:0, hurtTimer:0, stun:0, invuln:0,
      slow:0, form, isCPU, aiTimer:0, ai:{left:false,right:false,jump:false,attack:false,special:false,dodge:false},
      anim:rand(0,100), flash:0, action:'idle', actionTimer:0, lastHitBy:null, respawn:0
    };
    if(c.id==='moron'){ f.speed=5.1; f.jumpPower=13.5; }
    if(c.id==='bigl'){ f.speed=5.45; f.jumpPower=12.9; }
    if(c.id==='straw'){ f.speed=5.35; f.jumpPower=13.25; }
    if(c.id==='gleebo') f.form=form;
    return f;
  }

  function startBattle(){
    game.cpuChoice = chooseCPU();
    player = makeFighter(game.selected, 340, 1, false, game.form);
    cpu = makeFighter(game.cpuChoice, 875, -1, true, Math.floor(Math.random()*3));
    game.attacks.length=0; game.particles.length=0; game.effects.length=0;
    game.roundTime=99; game.winner=null; game.state='battle'; game.paused=false; game.introTimer=150; game.shake=0; game.flash=0;
    audio.confirm();
  }
  function chooseCPU(){
    const choices=[0,1,2,3].filter(i=>i!==game.selected);
    return choices[Math.floor(Math.random()*choices.length)];
  }
  function rematch(){
    const savedCPU=game.cpuChoice;
    player=makeFighter(game.selected,340,1,false,game.form);
    cpu=makeFighter(savedCPU,875,-1,true,Math.floor(Math.random()*3));
    game.attacks.length=0; game.particles.length=0; game.effects.length=0; game.roundTime=99; game.winner=null; game.state='battle'; game.introTimer=120; audio.confirm();
  }

  function currentInput(f){
    if(f.isCPU) return f.ai;
    return {
      left:keys.KeyA||keys.ArrowLeft||touch.left,
      right:keys.KeyD||keys.ArrowRight||touch.right,
      jump:keys.KeyW||keys.ArrowUp||keys.Space||touch.jump,
      attack:keys.KeyJ||touch.attack,
      special:keys.KeyK||touch.special,
      dodge:keys.KeyL||touch.dodge
    };
  }

  function updateAI(f, enemy){
    f.aiTimer--;
    if(f.aiTimer>0) return;
    f.aiTimer=Math.floor(rand(7,15));
    const a=f.ai; a.left=a.right=a.jump=a.attack=a.special=a.dodge=false;
    const dx=(enemy.x+enemy.w/2)-(f.x+f.w/2), dy=(enemy.y+enemy.h/2)-(f.y+f.h/2), adx=Math.abs(dx);
    const center=f.x+f.w/2;
    if(f.y>570){ a.left=center>W/2; a.right=center<W/2; a.jump=true; return; }
    if(center<210){a.right=true; if(Math.random()<.35)a.jump=true;}
    else if(center>1070){a.left=true;if(Math.random()<.35)a.jump=true;}
    else if(adx>105){ a.right=dx>0; a.left=dx<0; }
    else if(adx<58 && Math.random()<.22){ a.left=dx>0; a.right=dx<0; }
    if(dy<-75 && Math.random()<.65) a.jump=true;
    if(!f.grounded && f.vy>4 && Math.random()<.08) a.jump=true;
    if(adx<130 && Math.abs(dy)<90 && f.attackCooldown<=0 && Math.random()<.72) a.attack=true;
    if(adx<350 && Math.abs(dy)<130 && f.specialCooldown<=0 && Math.random()<.24) a.special=true;
    if(enemy.attackTimer>0 && adx<125 && f.dodgeCooldown<=0 && Math.random()<.42) a.dodge=true;
  }

  function performLight(f){
    if(f.attackCooldown>0 || f.stun>0 || f.respawn>0) return;
    f.attackCooldown = f.id==='gleebo' && f.form===2 ? 20 : 25;
    f.attackTimer=12; f.action='attack'; f.actionTimer=12;
    let reach=58, damage=7.6, kbx=6.6, kby=-3.5, yoff=24, h=42, color=CHARACTERS[f.charIndex].accent, status=null;
    if(f.id==='gleebo'){
      const form=FORM_DATA[f.form]; damage*=form.damage;
      if(f.form===0){damage=9.1;kbx=7.6;color=form.color;}
      if(f.form===1){damage=7.0;kbx=5.7;color=form.color;status='slow';}
      if(f.form===2){damage=7.1;kbx=6.0;color=form.color;reach=62;}
    } else if(f.id==='moron'){ reach=92; damage=7.2; kbx=6.1; h=36; color='#2bdc68'; }
    else if(f.id==='bigl'){ reach=78; damage=8.1; kbx=7.0; h=54; yoff=14; color='#7bc0ff'; }
    else if(f.id==='straw'){ reach=105; damage=7.4; kbx=6.2; h=36; yoff=24; color='#ffb34f'; }
    const x=f.facing>0?f.x+f.w-4:f.x-reach+4;
    spawnAttack({owner:f,x,y:f.y+yoff,w:reach,h,damage,kbx:kbx*f.facing,kby,duration:7,color,status,kind:'melee'});
    audio.swing();
  }

  function performSpecial(f){
    if(f.specialCooldown>0 || f.stun>0 || f.respawn>0) return;
    f.specialCooldown=88; f.action='special'; f.actionTimer=20; audio.special();
    const cx=f.x+f.w/2, cy=f.y+f.h/2;
    if(f.id==='gleebo'){
      if(f.form===0){
        f.specialCooldown=92;
        spawnAttack({owner:f,x:cx+(f.facing>0?32:-66),y:cy-15,w:34,h:30,damage:10.0,kbx:8*f.facing,kby:-2.5,duration:90,color:'#ff663d',kind:'projectile',vx:8.7*f.facing,trail:'fire'});
      } else if(f.form===1){
        f.specialCooldown=82;
        spawnAttack({owner:f,x:cx+(f.facing>0?28:-78),y:cy-10,w:50,h:22,damage:8.0,kbx:5.5*f.facing,kby:-1.5,duration:100,color:'#62d8ff',kind:'projectile',vx:6.8*f.facing,status:'slow',trail:'ice'});
      } else {
        f.specialCooldown=74; f.vx=15.5*f.facing; f.invuln=9;
        spawnAttack({owner:f,x:f.x-8,y:f.y+12,w:f.w+16,h:f.h-18,damage:9.0,kbx:8.4*f.facing,kby:-3.2,duration:12,color:'#ffe94f',kind:'dash',follow:true,status:'zap'});
        addParticle(cx,cy,'#fff56b',18,7,28,4);
      }
    } else if(f.id==='moron'){
      f.specialCooldown=86; f.vy=Math.min(f.vy,-4.5);
      spawnAttack({owner:f,x:cx-74,y:cy-60,w:148,h:120,damage:9.0,kbx:7.2*f.facing,kby:-5,duration:20,color:'#32dd70',kind:'spin',follow:true});
    } else if(f.id==='bigl'){
      f.specialCooldown=84; f.vx=14.2*f.facing;
      spawnAttack({owner:f,x:f.x+(f.facing>0?35:-95),y:f.y+8,w:122,h:76,damage:10.0,kbx:9.0*f.facing,kby:-3.6,duration:13,color:'#75baff',kind:'dash',follow:true});
      addParticle(cx,cy,'#b9e2ff',12,6,30,4);
    } else {
      f.specialCooldown=88;
      spawnAttack({owner:f,x:cx+(f.facing>0?25:-235),y:cy-20,w:210,h:42,damage:9.5,kbx:8.3*f.facing,kby:-3.0,duration:13,color:'#ffb14a',kind:'stretch'});
    }
  }

  function performDodge(f){
    if(f.dodgeCooldown>0 || f.stun>0 || f.respawn>0) return;
    f.dodgeCooldown=72; f.invuln=18; f.action='dodge'; f.actionTimer=18; f.vx=9.5*f.facing; addParticle(f.x+f.w/2,f.y+f.h/2,'#dff4ff',10,4,26,3); audio.tone(700,.08,'triangle',.025,-280);
  }

  function spawnAttack(a){ a.hit=false; a.age=0; game.attacks.push(a); }

  function hitFighter(target, attack){
    if(target.invuln>0 || attack.hit || target.respawn>0) return;
    attack.hit=true;
    let damage=attack.damage;
    target.hp=clamp(target.hp-damage,0,target.maxHp);
    const scale=1+(100-target.hp)/115;
    target.vx=attack.kbx*scale;
    target.vy=attack.kby*scale;
    target.stun=Math.floor(10+damage*.75); target.hurtTimer=15; target.invuln=10; target.flash=8; target.lastHitBy=attack.owner;
    if(attack.status==='slow') target.slow=120;
    if(attack.status==='zap') target.stun+=5;
    game.shake=Math.min(18,game.shake+damage*.8); game.flash=Math.min(9,game.flash+3);
    addParticle(target.x+target.w/2,target.y+target.h/2,attack.color,Math.floor(8+damage),7,36,5);
    audio.hit();
    if(target.hp<=0) finishRound(attack.owner);
  }

  function finishRound(winner){
    if(game.winner) return;
    game.winner=winner; game.state='gameover'; audio.ko();
    if(winner===player){ game.wins++; safeSet('friendFighterWins',String(game.wins)); }
    addParticle(winner.x+winner.w/2,winner.y+winner.h/2,'#fff4a8',45,10,70,7);
  }

  function ringOut(f){
    f.hp=clamp(f.hp-22,0,100); game.shake=18; audio.hit();
    addParticle(clamp(f.x+f.w/2,80,W-80),H-15,'#ffffff',28,9,45,5);
    if(f.hp<=0){ finishRound(f===player?cpu:player); return; }
    f.x=f===player?355:860; f.y=120; f.vx=0; f.vy=0; f.respawn=70; f.invuln=110; f.stun=0;
  }

  let jumpLatchP=false, jumpLatchC=false, attackLatchP=false, attackLatchC=false, specialLatchP=false, specialLatchC=false, dodgeLatchP=false, dodgeLatchC=false;

  function updateFighter(f,enemy){
    if(f.isCPU) updateAI(f,enemy);
    const inp=currentInput(f);
    f.anim++; f.prevY=f.y;
    if(f.attackCooldown>0)f.attackCooldown--; if(f.specialCooldown>0)f.specialCooldown--; if(f.dodgeCooldown>0)f.dodgeCooldown--;
    if(f.attackTimer>0)f.attackTimer--; if(f.hurtTimer>0)f.hurtTimer--; if(f.stun>0)f.stun--; if(f.invuln>0)f.invuln--; if(f.slow>0)f.slow--; if(f.flash>0)f.flash--; if(f.actionTimer>0)f.actionTimer--; else f.action='idle'; if(f.respawn>0)f.respawn--;
    const control=f.stun<=0 && f.respawn<=0;
    const moveScale=f.slow>0?.63:1;
    let speed=f.speed*moveScale;
    if(f.id==='gleebo') speed*=FORM_DATA[f.form].speed;
    if(control){
      if(inp.left&&!inp.right){f.vx-=f.accel;f.facing=-1;}
      if(inp.right&&!inp.left){f.vx+=f.accel;f.facing=1;}
      if(!inp.left&&!inp.right&&f.grounded)f.vx*=.79;
      f.vx=clamp(f.vx,-speed,speed);
    }
    // JS has no reference variables; edge handling is below.
    const jumpLatch=f.isCPU?jumpLatchC:jumpLatchP;
    if(control && inp.jump && !jumpLatch && f.jumps>0){
      f.vy=-f.jumpPower; f.grounded=false; f.platform=null; f.jumps--; f.action='jump'; f.actionTimer=12; audio.jump(); addParticle(f.x+f.w/2,f.y+f.h,'#d9e8ff',7,3,24,3);
    }
    if(f.isCPU) jumpLatchC=inp.jump; else jumpLatchP=inp.jump;
    const al=f.isCPU?attackLatchC:attackLatchP;
    if(control&&inp.attack&&!al)performLight(f);
    if(f.isCPU)attackLatchC=inp.attack;else attackLatchP=inp.attack;
    const sl=f.isCPU?specialLatchC:specialLatchP;
    if(control&&inp.special&&!sl)performSpecial(f);
    if(f.isCPU)specialLatchC=inp.special;else specialLatchP=inp.special;
    const dl=f.isCPU?dodgeLatchC:dodgeLatchP;
    if(control&&inp.dodge&&!dl)performDodge(f);
    if(f.isCPU)dodgeLatchC=inp.dodge;else dodgeLatchP=inp.dodge;

    f.vy+=.68; f.vy=Math.min(f.vy,17); f.x+=f.vx; f.y+=f.vy;
    if(!f.grounded)f.vx*=.992;
    f.grounded=false; f.platform=null;
    const oldBottom=f.prevY+f.h, newBottom=f.y+f.h;
    if(f.vy>=0){
      for(const p of STAGE.platforms){
        if(f.x+f.w>p.x+8 && f.x<p.x+p.w-8 && oldBottom<=p.y+7 && newBottom>=p.y){
          f.y=p.y-f.h; f.vy=0; f.grounded=true; f.platform=p; f.jumps=2; break;
        }
      }
    }
    if(f.y>H+100 || f.x<-180 || f.x>W+180) ringOut(f);
  }

  function updateAttacks(){
    for(let i=game.attacks.length-1;i>=0;i--){
      const a=game.attacks[i]; a.age++; a.duration--;
      if(a.follow){
        const o=a.owner;

    }
    if(game.paused){ctx.fillStyle='rgba(2,4,14,.72)';ctx.fillRect(0,0,W,H);text('PAUSED',W/2,H/2-25,64,'950');text('Press P or Escape to continue',W/2,H/2+40,22,'700','center','rgba(255,255,255,.78)');}
    if(game.flash>0){ctx.fillStyle=`rgba(255,255,255,${game.flash*.035})`;ctx.fillRect(0,0,W,H);}
  }

  function drawTitle(){
    drawBackground();
    // silhouette stage
    ctx.globalAlpha=.38;drawStage();ctx.globalAlpha=1;
    // elemental emblem
    const cx=W/2,cy=207;ctx.save();ctx.translate(cx,cy);ctx.rotate(game.titlePulse*.14);
    const colors=['#ff6346','#5bd8ff','#ffe950','#7ce768'];
    for(let i=0;i<4;i++){ctx.rotate(TAU/4);ctx.fillStyle=colors[i];ctx.shadowColor=colors[i];ctx.shadowBlur=24;ctx.beginPath();ctx.moveTo(0,-74);ctx.quadraticCurveTo(44,-32,0,0);ctx.quadraticCurveTo(-44,-32,0,-74);ctx.fill();}
    ctx.restore();
    ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=16;text('FRIEND',W/2,330,86,'950');text('FIGHTER',W/2,414,94,'950','center','#ffe05f');ctx.shadowBlur=0;
    text('v0.1',W/2,468,18,'900','center','rgba(255,255,255,.68)');text('CHARACTER ART REFRESH',W/2,492,11,'900','center','rgba(126,232,90,.72)');
    ctx.fillStyle='rgba(7,9,24,.68)';roundedRect(W/2-250,500,500,72,24,true,false);ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=2;roundedRect(W/2-250,500,500,72,24,false,true);
    const pulse=.62+.38*Math.sin(game.titlePulse*3);text('PRESS ANY KEY',W/2,536,25,'900','center',`rgba(255,255,255,${pulse})`);
    text('Single Player Battle',W/2,610,18,'700','center','rgba(255,255,255,.72)');
    drawParticles();
  }

  function drawCharacterCard(i,x,y,w,h){
    const c=CHARACTERS[i],selected=game.selected===i;
    ctx.save();if(selected){ctx.shadowColor=c.accent;ctx.shadowBlur=25;}
    ctx.fillStyle=selected?'rgba(255,255,255,.16)':'rgba(7,9,24,.72)';roundedRect(x,y,w,h,22,true,false);ctx.strokeStyle=selected?c.accent:'rgba(255,255,255,.15)';ctx.lineWidth=selected?5:2;roundedRect(x,y,w,h,22,false,true);ctx.shadowBlur=0;
    const px=x+12,py=y+12,pw=w-24,ph=178;ctx.fillStyle='rgba(255,255,255,.07)';roundedRect(px,py,pw,ph,16,true,false);
    drawFighterPreview(i,px,py,pw,ph,i===0?game.form:0);
    ctx.fillStyle=c.accent;roundedRect(x+20,y+203,w-40,5,3,true,false);
    text(c.name,x+w/2,y+232,24,'950');text(c.subtitle,x+w/2,y+263,13,'800','center',c.accent);
    wrapText(c.desc,x+w/2,y+292,w-34,17,13,'rgba(255,255,255,.68)');
    if(selected){ctx.fillStyle=c.accent;roundedRect(x+w/2-65,y+h-35,130,25,12,true,false);text('SELECTED',x+w/2,y+h-22,11,'950','center','#06101b');}
    ctx.restore();
  }

  function wrapText(str,x,y,maxWidth,lineHeight,size,color){
    ctx.font=`700 ${size}px Inter, ui-sans-serif, system-ui`;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillStyle=color;const words=str.split(' ');let line='',lines=[];for(const word of words){const test=line?line+' '+word:word;if(ctx.measureText(test).width>maxWidth&&line){lines.push(line);line=word;}else line=test;}if(line)lines.push(line);lines.slice(0,3).forEach((l,i)=>ctx.fillText(l,x,y+i*lineHeight));ctx.textBaseline='middle';
  }

  function drawSelect(){
    drawBackground();ctx.fillStyle='rgba(3,5,17,.38)';ctx.fillRect(0,0,W,H);
    text('CHOOSE YOUR FIGHTER',W/2,55,39,'950');text('Arrow keys to move • Enter to battle',W/2,91,16,'700','center','rgba(255,255,255,.68)');
    const cardW=270,gap=26,start=(W-(cardW*4+gap*3))/2;for(let i=0;i<4;i++)drawCharacterCard(i,start+i*(cardW+gap),125,cardW,382);
    ctx.fillStyle='rgba(7,9,24,.78)';roundedRect(85,535,W-170,145,24,true,false);ctx.strokeStyle='rgba(255,255,255,.14)';ctx.lineWidth=2;roundedRect(85,535,W-170,145,24,false,true);
    if(game.selected===0){
      text('GLEEBO FORM',170,561,13,'900','left','rgba(255,255,255,.66)');
      FORM_DATA.forEach((f,i)=>{const x=255+i*265,sel=game.form===i;ctx.fillStyle=sel?f.color:'rgba(255,255,255,.08)';roundedRect(x,552,235,55,15,true,false);ctx.strokeStyle=sel?f.color2:'rgba(255,255,255,.12)';ctx.lineWidth=2;roundedRect(x,552,235,55,15,false,true);text(f.name,x+18,570,17,'950','left',sel?'#09101b':'#fff');text(f.desc,x+18,591,11,'700','left',sel?'rgba(9,16,27,.75)':'rgba(255,255,255,.58)');});
      text('Use ↑ / ↓ to change Gleebo’s form',W/2,639,15,'800','center','rgba(255,255,255,.72)');
    } else {
      const c=CHARACTERS[game.selected];text(c.name.toUpperCase(),135,571,16,'950','left',c.accent);wrapText(c.desc,560,563,590,23,17,'rgba(255,255,255,.76)');ctx.fillStyle=c.accent;roundedRect(935,557,210,70,18,true,false);text('ENTER TO FIGHT',1040,592,17,'950','center','#07101b');
    }
  }

  function drawGameOver(){
    drawBattle();ctx.fillStyle='rgba(2,4,14,.73)';ctx.fillRect(0,0,W,H);
    const won=game.winner===player, c=CHARACTERS[game.winner.charIndex];
    ctx.fillStyle='rgba(7,9,24,.88)';roundedRect(W/2-330,H/2-190,660,385,30,true,false);ctx.strokeStyle=c.accent;ctx.lineWidth=4;roundedRect(W/2-330,H/2-190,660,385,30,false,true);
    text(won?'VICTORY!':'DEFEAT',W/2,H/2-115,66,'950','center',won?'#ffe55f':'#ff6b6b');text(`${game.winner.name} wins the match`,W/2,H/2-51,24,'850');
    if(won)text(`Win Streak Record: ${game.wins}`,W/2,H/2-8,16,'750','center','rgba(255,255,255,.7)');
    ctx.fillStyle='rgba(255,255,255,.10)';roundedRect(W/2-225,H/2+38,450,55,16,true,false);text('ENTER / SPACE — REMATCH',W/2,H/2+66,18,'900');
    text('ESC — Return to Character Select',W/2,H/2+125,16,'750','center','rgba(255,255,255,.68)');
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    if(game.state==='title')drawTitle();else if(game.state==='select')drawSelect();else if(game.state==='battle')drawBattle();else if(game.state==='gameover')drawGameOver();
  }

  function handleMenuKey(code){
    audio.init();
    if(game.state==='title'){game.state='select';audio.confirm();return;}
    if(game.state==='select'){
      if(code==='ArrowLeft'||code==='KeyA'){game.selected=(game.selected+3)%4;audio.select();}
      else if(code==='ArrowRight'||code==='KeyD'){game.selected=(game.selected+1)%4;audio.select();}
      else if((code==='ArrowUp'||code==='KeyW')&&game.selected===0){game.form=(game.form+2)%3;audio.select();}
      else if((code==='ArrowDown'||code==='KeyS')&&game.selected===0){game.form=(game.form+1)%3;audio.select();}
      else if(code==='Enter'||code==='Space')startBattle();
      return;
    }
    if(game.state==='battle'){
      if(code==='KeyP'||code==='Escape'){game.paused=!game.paused;audio.select();}
      if(code==='KeyM')game.muted=!game.muted;
      if(code==='KeyR')startBattle();
      return;
    }
    if(game.state==='gameover'){
      if(code==='Enter'||code==='Space')rematch();
      else if(code==='Escape'){game.state='select';game.winner=null;audio.select();}
    }
  }

  addEventListener('keydown',e=>{
    if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code))e.preventDefault();
    if(!keys[e.code]){pressed.add(e.code);handleMenuKey(e.code);} keys[e.code]=true;
  });
  addEventListener('keyup',e=>{keys[e.code]=false;pressed.delete(e.code);});

  canvas.addEventListener('pointerdown',e=>{
    audio.init();const r=canvas.getBoundingClientRect(),mx=(e.clientX-r.left)*W/r.width,my=(e.clientY-r.top)*H/r.height;
    if(game.state==='title'){game.state='select';audio.confirm();return;}
    if(game.state==='select'){
      const cardW=270,gap=26,start=(W-(cardW*4+gap*3))/2;
      for(let i=0;i<4;i++){const x=start+i*(cardW+gap);if(mx>=x&&mx<=x+cardW&&my>=125&&my<=507){if(game.selected===i)startBattle();else{game.selected=i;audio.select();}return;}}
      if(game.selected===0&&my>=545&&my<=615){for(let i=0;i<3;i++){const x=255+i*265;if(mx>=x&&mx<=x+235){game.form=i;audio.select();return;}}}
      if(my>620)startBattle();
    } else if(game.state==='gameover'){rematch();}
  });

  for(const btn of document.querySelectorAll('.touchBtn')){
    const action=btn.dataset.action;
    const set=v=>{touch[action]=v;audio.init();if(game.state==='title'&&v){game.state='select';audio.confirm();}if(game.state==='select'&&v&&action==='attack')startBattle();if(game.state==='gameover'&&v&&action==='attack')rematch();};
    btn.addEventListener('pointerdown',e=>{e.preventDefault();btn.setPointerCapture(e.pointerId);set(true);});
    btn.addEventListener('pointerup',e=>{e.preventDefault();set(false);});
    btn.addEventListener('pointercancel',()=>set(false));
  }

  function loop(ts){
    const dt=Math.min(50,ts-game.lastTimestamp);game.lastTimestamp=ts;game.accumulator+=dt;
    while(game.accumulator>=16.6667){update();game.accumulator-=16.6667;}
    render();requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
